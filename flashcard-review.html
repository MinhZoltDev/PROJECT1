<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MinhZolt | Review Flashcard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="flashcard-review.css" />
  </head>
  <body>
    <main class="review-page">
      <header class="review-head">
        <a href="flashcard-builder.html" class="back-link"><i class="bi bi-arrow-left"></i> Quay lại editor</a>
        <h1 id="setTitle">Flashcard Set</h1>
        <p id="setDescription"></p>
      </header>

      <button id="reviewCard" class="review-card" type="button" aria-label="Lật thẻ">
        <div class="card-top"><span><i class="bi bi-lightbulb"></i> Get a hint</span><span><i class="bi bi-volume-up"></i> <i class="bi bi-star"></i></span></div>
        <p id="cardContent" class="card-content"></p>
        <div class="card-bottom">Click the card to flip</div>
      </button>

      <div class="controls">
        <button id="prevBtn" class="ctrl" type="button"><i class="bi bi-arrow-left"></i></button>
        <button id="nextBtn" class="ctrl" type="button"><i class="bi bi-arrow-right"></i></button>
      </div>
    </main>

    <script src="flashcard-review.js"></script>
  </body>
</html>
